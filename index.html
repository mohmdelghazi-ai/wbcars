<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CARSss</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css"/>
  </head>
  <body>

    <!-- ===== HEADER ===== -->
    <div class="header">
        <img src="images/portfolio.webp" class="header__logo" alt="Logo"/>
        <nav class="header__nav">
          <a href="#" class="header__link">moh</a>
          <a href="#" class="header__link">Contact</a>
        </nav>
        <button class="header__btn">dkhl</button>
    </div>

    <!-- ===== CARS GALLERY ===== -->
    <div class="gallery">
      <h2 class="gallery__title">Our Collection</h2>
      <div class="gallery__grid">
        <div class="gallery__card">
          <img src="images/cars1.jpg" alt="Car 1" class="gallery__img">
          <p class="gallery__label">First</p>
        </div>
        <div class="gallery__card">
          <img src="images/cars2.webp" alt="Car 2" class="gallery__img">
          <p class="gallery__label">Second</p>
        </div>
        <div class="gallery__card">
          <img src="images/cars3.webp" alt="Car 3" class="gallery__img">
          <p class="gallery__label">Third</p>
        </div>
        <div class="gallery__card">
          <img src="images/cars4.avif" alt="Car 4" class="gallery__img">
          <p class="gallery__label">Fourth</p>
        </div>
      </div>
    </div>

    <!-- ===== CONTACT FORM ===== -->
    <div class="contact">
      <h2 class="contact__title">Get In Touch</h2>
      <p class="contact__subtitle">Fill in your details and we'll reach out to you.</p>
      <div class="contact__form">
        <input type="text" placeholder="Full Name" class="contact__input">
        <input type="email" placeholder="Email Address" class="contact__input">
        <input type="text" placeholder="City" class="contact__input">
        <input type="submit" value="Submit" class="contact__submit">
      </div>
    </div>

  </body>
</html>
